{% extends 'main.html' %} {% block content %}
<div class="container">
  <h1 class="heading">Trash</h1>

  <div class="topactions">
    <a href="{% url 'trashrestoreall' %}" class="topbtn"> ✓ Restore All </a>

    <a href="{% url 'trashdeleteall' %}" class="topbtn"> 🗑 Delete All </a>
  </div>

  <table class="tasktable">
    <thead>
      <tr>
        <th class="titlecol">Title</th>
        <th class="desccol">Description</th>
        <th class="actionhead">Actions</th>
      </tr>
    </thead>

    <tbody>
      {% for task in data %}
      <tr>
        <td>{{ task.title }}</td>
        <td>{{ task.description }}</td>

        <td>
          <div class="actioncol">
            <a href="{% url 'trestore' task.id %}" class="editbtn"> Restore </a>

            <a href="{% url 'tdelete' task.id %}" class="deletebtn"> Delete </a>
          </div>
        </td>
      </tr>

      {% empty %}
      <tr>
        <td colspan="3">No Tasks Available in Trash</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
